name: QA Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Godot Linux Binary
        run: |
          # Downloading Godot 4.6.1 to match your project version
          wget https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          unzip Godot_v4.6.1-stable_linux.x86_64.zip
          chmod +x Godot_v4.6.1-stable_linux.x86_64
          # Export the required GODOT_BIN environment variable for your script
          echo "GODOT_BIN=$GITHUB_WORKSPACE/Godot_v4.6.1-stable_linux.x86_64" >> $GITHUB_ENV

      - name: Make QA Script Executable
        run: chmod +x run_experimental_qa.sh

      - name: Run Experimental QA Pipeline
        run: ./run_experimental_qa.sh

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Godot Editor
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          unzip Godot_v4.6.1-stable_linux.x86_64.zip
          chmod +x Godot_v4.6.1-stable_linux.x86_64

      - name: Download Export Templates
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          unzip Godot_v4.6.1-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.6.1.stable
          mv templates/* ~/.local/share/godot/export_templates/4.6.1.stable/

      - name: Export Windows Desktop
        run: |
          mkdir -p build/windows
          ./Godot_v4.6.1-stable_linux.x86_64 --headless --export-release "Windows Desktop" build/windows/Dutch.exe

      - name: Export Web
        run: |
          mkdir -p build/web
          ./Godot_v4.6.1-stable_linux.x86_64 --headless --export-release "Web" build/web/index.html

      - name: Upload Windows Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Dutch-Windows-Build
          path: build/windows/

      - name: Upload Web Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Dutch-Web-Build
          path: build/web/

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          zip -j Dutch-Windows-v0.5.${{ github.run_number }}.zip build/windows/*
          zip -j Dutch-Web-v0.5.${{ github.run_number }}.zip build/web/*
          gh release create v0.5.${{ github.run_number }} Dutch-Windows-v0.5.${{ github.run_number }}.zip Dutch-Web-v0.5.${{ github.run_number }}.zip --title "Release v0.5.${{ github.run_number }}" --notes "Automated release of the Dutch game built from main branch commit ${{ github.sha }}."
