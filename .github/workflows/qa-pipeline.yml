name: QA Pipeline

on:
  workflow_dispatch:
    inputs:
      godot_version:
        description: 'Optional Godot version to download (defaults to 4.6.1)'
        required: false
      godot_download_url:
        description: 'Optional override URL for the Godot Linux x86_64 archive'
        required: false
  push:
    branches:
      - main
      - fix/strict-fsm-hardening
      - fix/qa-pipeline-godot
      - feature/qa-pipeline
  pull_request:

jobs:
  run-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install unzip and jq (needed for Godot archive)
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip jq

      - name: Download Godot binary
        env:
          GODOT_VERSION_OVERRIDE: ${{ github.event.inputs.godot_version }}
          GODOT_DOWNLOAD_URL_OVERRIDE: ${{ github.event.inputs.godot_download_url }}
        run: |
          set -euo pipefail
          default_version="4.6.1"
          download_url="${GODOT_DOWNLOAD_URL_OVERRIDE:-}"
          if [ -z "$download_url" ]; then
            version="${GODOT_VERSION_OVERRIDE:-$default_version}"
            download_url="https://github.com/godotengine/godot/releases/download/$version-stable/Godot_v$version-stable_linux.x86_64.zip"
          fi
          echo "Downloading Godot from $download_url"
          curl -L -o godot.zip "$download_url"
          unzip -q godot.zip -d godot
          godot_binary=$(ls godot/*linux*.x86_64 2>/dev/null | head -n 1 || true)
          if [ -z "$godot_binary" ]; then
            echo "Godot binary not found inside archive" >&2
            exit 1
          fi
          chmod +x "$godot_binary"
          echo "GODOT_BINARY=$godot_binary" >> $GITHUB_ENV

      - name: Run the QA pipeline
        run: $GODOT_BINARY --headless --path ${{ github.workspace }} --script res://qa_pipeline.gd
